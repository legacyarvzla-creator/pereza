<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene mindar-image="imageTargetSrc: assets/tu-target.mind; autoStart: true; uiLoading: no;" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
             
        <a-assets>
            <video id="vid" src="assets/video-verde.mp4" 
                   preload="auto" loop="true" 
                   crossorigin="anonymous" muted playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" 
                     position="0 0 0" 
                     material="transparent: true; alphaTest: 0.5;">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // Este script es un "arranque forzado"
        window.addEventListener('click', () => {
            const v = document.querySelector("#vid");
            v.play();
            console.log("Play forzado por click");
        });

        const target = document.querySelector('[mindar-image-target]');
        const video = document.querySelector('#vid');

        target.addEventListener("targetFound", () => {
            console.log("Target en vista");
            video.play();
        });
    </script>
</body>
</html>
