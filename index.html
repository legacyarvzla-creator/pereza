<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Alpha Video - Side-by-Side</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

 <script>
  AFRAME.registerComponent('video-alpha-sbs', {
    init: function () {
      const el = this.el;
      
      // Forzamos la actualización cuando el video esté listo
      el.addEventListener('materialtextureloaded', () => {
        const mesh = el.getObject3D('mesh');
        const material = mesh.material;

        material.onBeforeCompile = (shader) => {
          shader.fragmentShader = shader.fragmentShader.replace(
            '#include <map_fragment>',
            `
            // Leemos la textura del video
            // La mitad superior para el color (y de 0.5 a 1.0)
            vec4 colorPart = texture2D(map, vec2(vUv.x, vUv.y * 0.5 + 0.5));
            // La mitad inferior para el alfa (y de 0.0 a 0.5)
            vec4 alphaPart = texture2D(map, vec2(vUv.x, vUv.y * 0.5));
            
            diffuseColor = vec4(colorPart.rgb, alphaPart.r);
            `
          );
        };
        material.needsUpdate = true;
      });
    }
  });
</script>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  
  <a-assets>
    <video id="vid" src="Video_WebAR.mp4" 
           preload="auto" loop="true" 
           crossorigin="anonymous" playsinline webkit-playsinline>
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane material="src: #vid; transparent: true; shader: flat" 
             video-alpha-sbs
             position="0 0 0" 
             rotation="0 0 0" 
             width="1" height="1">
    </a-plane>
  </a-entity>
</a-scene>
    <script>
      // Auto-reproducir cuando se detecte el target (opcional)
      const targetEl = document.querySelector('[mindar-image-target]');
      const video = document.querySelector('#vid');
      
      targetEl.addEventListener("targetFound", event => {
        video.play();
      });

      targetEl.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
