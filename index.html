<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
        // COMPONENTE PARA ELIMINAR EL FONDO VERDE
        AFRAME.registerComponent('chromakey', {
            schema: { color: {type: 'color', default: '0 1 0'} },
            init: function () {
                const mesh = this.el.getObject3D('mesh');
                mesh.material.onBeforeCompile = (shader) => {
                    shader.uniforms.chromaColor = { value: new THREE.Color(this.data.color) };
                    shader.fragmentShader = `
                        uniform vec3 chromaColor;
                        ${shader.fragmentShader}
                    `.replace(
                        'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
                        `float dist = distance(diffuseColor.rgb, chromaColor);
                         if (dist < 0.4) { discard; } 
                         else { gl_FragColor = vec4( outgoingLight, diffuseColor.a ); }`
                    );
                };
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #ui { 
            position: absolute; z-index: 9999; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 20px 40px; border-radius: 50px; border: none; 
            background: #00ffcc; color: black; font-size: 18px; 
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <button id="playButton">INICIAR EXPERIENCIA AR</button>
    </div>

    <video id="miVideo" src="./assets/video-verde.mp4" preload="auto" crossorigin="anonymous" muted playsinline webkit-playsinline loop></video>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="1" position="0 0 0" chromakey="color: 0 1 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#playButton");
        const video = document.querySelector("#miVideo");

        btn.addEventListener('click', function() {
            document.querySelector("#ui").style.display = "none";
            video.play(); // Esto activa el video para que el Redmi lo suelte
        });

        // Control de reproducción automática al detectar la franela
        const target = document.querySelector('[mindar-image-target]');
        target.addEventListener("targetFound", () => { video.play(); });
        target.addEventListener("targetLost", () => { video.pause(); });
    </script>
</body>
</html>
