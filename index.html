<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./assets/tu-target.mind;" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="vid" src="./assets/video-verde.mp4" loop="true" crossorigin="anonymous" playsinline muted></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" transparent="true"></a-video>
        </a-entity>
    </a-scene>
    <script>
        // Auto-play al detectar
        const target = document.querySelector('[mindar-image-target]');
        const video = document.querySelector('#vid');
        target.addEventListener("targetFound", () => video.play());
        target.addEventListener("targetLost", () => video.pause());
    </script>
</body>
</html>
